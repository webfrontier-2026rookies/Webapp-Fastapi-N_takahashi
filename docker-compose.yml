services:
  db:
    image: postgres:15
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c idle_in_transaction_session_timeout=60000
    container_name: fastapi_db
    restart: always
    stop_grace_period: 1m30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: ${DB_URL}
    ports:
      - "${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fastapi_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT_APP}"
    environment:
      ENVIROMENT: development
      DATABASE_URL: ${DB_URL}
    env_file:
      - .env
    command: sh -c "alembic upgrade head && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:8000"
    volumes:
      - .:/app

  #テスト用
  test_db:
    image: postgres:15
    env_file:
      - .env.test
    ports:
      - "5433:5432"

volumes:
  postgres_data:
