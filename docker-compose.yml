services:
  db:
    image: postgres:15
    container_name: fastapi_db
    restart: always
    stop_grace_period: 1m30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  app:
    build: .
    container_name: fastapi_app
    depends_on:
      - db
    ports:
      - "${PORT_APP}"
    environment:
      DATABASE_URL: ${DB_URL}

    volumes:
      - .:/app
volumes:
  postgres_data: