<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>TAGの更新</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', path='/todo_update.css') }}"
    />
  </head>
  <body>
    <h1>tagの更新</h1>

    <form id="updateForm" class="update-form">
      <div class="form-group">
        <label>タイトル:</label>
        <input
          id="tagTitle"
          type="text"
          name="title"
          required
          value="{{ tag.title }}"
        />
      </div>
      <div class="form-group">
        <label>詳細:</label>
        <textarea id="tagDescription" name="description" required>
{{ tag.description }}</textarea
        >
      </div>
      <div class="form-group">
        <label>使用方法:</label>
        <input id="tagUsage" type="text" name="usage" value="{{ tag.usage }}" />
      </div>

      <button type="button" onclick="executePutUpdate('{{ tag.id }}')">
        変更を保存する
      </button>
    </form>

    <script>
      async function executePutUpdate(tag_id) {
        const currentTitle = document.getElementById("tagTitle").value;
        const currentDescription =
          document.getElementById("tagDescription").value;
        const currentTagUsage = document.getElementById("tagUsage").value;

        const response = await fetch(`/api/tag/${tag_id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            title: currentTitle,
            description: currentDescription,
            usage: currentTagUsage,
          }),
        });

        if (response.ok) {
          window.location.href = "/api/tag";
        } else {
          alert("更新に失敗しました。入力内容を確認してください。");
        }
      }
    </script>
  </body>
</html>
