<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo更新</title>
  </head>

  <body>
    <form id="updateForm">
      <input type="text" id="todoTitle" name="title" value="{{ todo.title }}" />
      <textarea id="todoDescription" name="description">
      {{ todo.description }}</textarea
      >

      <input type="hidden" name="due_date" value="{{ todo.due_date }}" />

      <button type="button" onclick="executePutUpdate({ todoid })">
        更新する
      </button>
    </form>

    <script>
      async function executePutUpdate(todoId) {
        // ① フォーム内のデータを一撃でまるごと取得する（超便利です！）
        const formElement = document.getElementById("updateForm");
        const formData = new FormData(formElement);

        // ② FastAPIの @router.put に向けて通信開始！
        const response = await fetch(`/api/todo/${todoId}`, {
          method: "PUT", // ⭕ 指定通りのPUT
          // ⚠️ Formデータ（Form(...)）を送るときは、headersのContent-Typeは「書かない」のが鉄則です！（ブラウザが自動設定してくれます）
          body: formData,
        });

        // ③ 無事に更新できたら、一覧画面へジャンプ
        if (response.ok) {
          window.location.href = "/api/todo"; // 一覧画面のURL（適宜調整してください）
        } else {
          alert("更新に失敗しました。入力内容やログを確認してください。");
        }
      }
    </script>
  </body>
</html>
