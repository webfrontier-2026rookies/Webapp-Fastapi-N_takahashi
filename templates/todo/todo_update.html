<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>TODOの更新</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', path='/todo_update.css') }}"
    />
  </head>
  <body>
    <h1>TODOの更新</h1>

    <form id="updateForm" class="update-form">
      <div class="form-group">
        <label>タイトル:</label>
        <input
          type="text"
          name="title"
          required
          name="csrf-token"
          value="{{ csrf_token }}"
        />
      </div>
      <div class="form-group">
        <label>詳細:</label>
        <textarea name="description" required></textarea>
      </div>
      <div class="form-group">
        <label>期限:</label>
        <input type="datetime-local" name="due_date" required />
      </div>
      <div class="form-group">
        <label>ステータス:</label>
        <select name="status" required>
          <option value="false">未完了</option>
          <option value="true">完了</option>
        </select>
      </div>
      <div class="form-group">
        <label>タグ:</label>
        <select name="tag_ids" multiple>
          {% for tag in tags %}
          <option value="{{ tag.id }}">{{ tag.title }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>リンク:</label>
        <input type="url" name="link" />
      </div>
      <div class="form-group">
        <label>メモ:</label>
        <input type="text" name="memo" />
      </div>

      <button type="button" onclick="executePutUpdate({ todo_id })">
        変更を保存する
      </button>
    </form>

    <script>
      async function executePutUpdate(todoId) {
        const currentTitle = document.getElementById("todoTitle").value;
        const currentDescription =
          document.getElementById("todoDescription").value;
        const currentTagId = document.getElementById("todoTagId").value;

        const response = await fetch(`/api/todo/${todoId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            title: currentTitle,
            description: currentDescription,
            tag_id: parseInt(currentTagId),
          }),
        });

        if (response.ok) {
          window.location.href = "/api/todo";
        } else {
          alert("更新に失敗しました。入力内容を確認してください。");
        }
      }
    </script>
  </body>
</html>
