<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/login.css') }}" />
  </head>
  <body>
    <h1>ログイン</h1>
    <form class="register-form" action="/account/login" method="POST">
      <div class="form-group">
        <label>ユーザー名:</label>
        <input type="text" name="username" required />
      </div>
      <div class="form-group">
        <label>パスワード:</label>
        <input type="text" name="hashed_password" required />
      </div>
      <div class="link">
        <form action="/account/login" method="GET" style="display: inline">
          <button type="submit" class="login-btn">ログイン</button>
        </form>

        <a href="/register" class="register-link"
          >アカウント登録画面の方はこちら</a
        >
      </div>
    </form>
  </body>
</html>
