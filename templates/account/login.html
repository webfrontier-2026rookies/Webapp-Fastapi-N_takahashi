<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/login.css') }}" />
  </head>
  <body>
    <h1>ログイン</h1>
    <form class="register-form" action="/account/login" method="POST">
      <input type="hidden" name="X-CSRF-Token" value="{{ csrf_token }}" />

      <div class="form-group">
        <label>ユーザー名:</label>
        <input type="text" name="username" required />
      </div>

      <div class="form-group">
        <label>パスワード:</label>
        <input type="password" name="hashed_password" required />
      </div>

      <button type="submit" class="register-btn">ログイン</button>
    </form>
  </body>
</html>
