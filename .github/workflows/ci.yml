name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: n_takahashi
          POSTGRES_PASSWORD: password
          POSTGRES_DB: todo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. GitHubからコードを持ってくる（そのままでOK）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Pythonの環境を作る（そのままでOK）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ✨【修正】3. uv をこのサーバーにインストールする
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # キャッシュを有効にして2回目以降をさらに爆速にする

      # ✨【修正】4. uv の力でライブラリを一瞬で同期する（これで絶対に止まらなくなります！）
      - name: Install dependencies with uv
        run: |
          uv sync --frozen  # uv.lock のカギを使って完璧に一括インストールします

      # ✨【修正】5. pip-audit も uv の環境内で安全に実行する
      - name: Run security audit on dependencies
        run: |
          uv run pip-audit --spec requirements.txt || uv run pip-audit

      # 6. アレンビックの往復チェック（uv run を頭につけて実行します）
      - name: Verify database migrations (Upgrade and Downgrade)
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/webapp_db
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
