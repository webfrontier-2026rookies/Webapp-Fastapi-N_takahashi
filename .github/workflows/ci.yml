name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: n_takahashi
          POSTGRES_PASSWORD: password
          POSTGRES_DB: todo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. GitHubからコードを持ってくる
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Pythonの環境を作る
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 3. ライブラリをインストールする
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run security audit on dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      #マイグレーションの往復チェック
      # 最新の歴史へ進化（upgrade）させ、最初の状態へ退化（downgrade）できるかを自動テストします
      - name: Verify database migrations (Upgrade and Downgrade)
        env:
          DATABASE_URL: postgresql://n_takahashi:password@db:5432/todo_db
        run: |
          alembic upgrade head
          alembic downgrade base

      # # 5. アプリのテスト
