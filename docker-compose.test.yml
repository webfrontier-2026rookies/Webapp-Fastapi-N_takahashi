services:
  test_db:
    image: postgres:15
    container_name: fastapi_db_test
    restart: always
    stop_grace_period: 1m30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}"

  test_app:
    build: .:/app
    container_name: fastapi_app_test
    depends_on:
      - db
    ports:
      - "${PORT_APP}"
    environment:
      ENVIRONMENT: test
      DATABASE_URL: ${DB_URL}
    volumes:
      - .:/app
    env_file:
      - .env.test
volumes:
  postgres_data:
